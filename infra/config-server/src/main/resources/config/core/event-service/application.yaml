spring:
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  sql:
    init:
      mode: always

  jackson:
    time-zone: UTC
    date-format: yyyy-MM-dd HH:mm:ss

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:6542/event
    username: postgres
    password: root

server:
  port: 9091

logging:
  level:
    root: DEBUG
    ru.practicum.main: TRACE
    org.springframework.orm.jpa: DEBUG
    org.springframework.transaction: DEBUG
    org.springframework.transaction.interceptor: DEBUG
    org.springframework.orm.jpa.JpaTransactionManager: INFO

stat-server:
  url: http://localhost:9090

grpc:
  client:
    analyzer:
      address: discovery:///analyzer
      enableKeepAlive: true
      keepAliveWithoutCalls: true
      negotiationType: plaintext
      enableRetry: true
      retryAttempts: 15
      retryDelay: 3000
    collector:
      address: discovery:///collector
      enableKeepAlive: true
      keepAliveWithoutCalls: true
      negotiationType: plaintext
      enableRetry: true
      retryAttempts: 15
      retryDelay: 3000

